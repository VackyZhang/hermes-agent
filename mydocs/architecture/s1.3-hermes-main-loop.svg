<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Hermes Agent 主循环泳道图模板 -->
  <!-- 使用此模板画出：用户 → CLI → AIAgent → LLM → Tool 的交互流程 -->
  
  <defs>
    <style>
      .swimlane { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .actor { fill: #4CAF50; stroke: #333; stroke-width: 1; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .label { font-family: Arial; font-size: 12px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  
  <!-- 泳道背景 -->
  <rect x="100" y="50" width="600" height="500" class="swimlane"/>
  
  <!-- 参与者 -->
  <text x="150" y="80" class="label">User</text>
  <text x="300" y="80" class="label">CLI</text>
  <text x="450" y="80" class="label">AIAgent</text>
  <text x="600" y="80" class="label">LLM</text>
  <text x="750" y="80" class="label">Tool</text>
  
  <!-- 步骤 1：用户输入 -->
  <circle cx="150" cy="120" r="20" class="actor"/>
  <text x="150" y="125" text-anchor="middle" fill="white">1</text>
  
  <!-- 步骤 2：CLI 转发 -->
  <line x1="170" y1="120" x2="280" y2="120" class="arrow"/>
  <circle cx="300" cy="120" r="20" class="actor"/>
  <text x="300" y="125" text-anchor="middle" fill="white">2</text>
  
  <!-- 步骤 3：AIAgent 调用 LLM -->
  <line x1="320" y1="120" x2="430" y2="120" class="arrow"/>
  <circle cx="450" cy="120" r="20" class="actor"/>
  <text x="450" y="125" text-anchor="middle" fill="white">3</text>
  
  <!-- 步骤 4：LLM 返回 -->
  <line x1="470" y1="120" x2="580" y2="120" class="arrow"/>
  <circle cx="600" cy="120" r="20" class="actor"/>
  <text x="600" y="125" text-anchor="middle" fill="white">4</text>
  
  <!-- 步骤 5：工具调用（如果需要） -->
  <line x1="620" y1="120" x2="730" y2="120" class="arrow"/>
  <circle cx="750" cy="120" r="20" class="actor"/>
  <text x="750" y="125" text-anchor="middle" fill="white">5</text>
  
  <!-- 标注 -->
  <text x="400" y="200" class="label">TODO：补充完整流程（12+ 步骤）</text>
  <text x="400" y="220" class="label">TODO：标注 autoCompact 触发位置（2 处）</text>
  
</svg>